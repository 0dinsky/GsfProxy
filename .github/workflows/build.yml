name: Build

on:
  pull_request:
  push:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (optional)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # --- КРИТИЧЕСКИЙ ШАГ: Установка конкретных build-tools ---
      - name: Install Android Build Tools 30.0.3
        run: |
          # Принятие лицензий (обязательно для скачивания компонентов)
          yes | sdkmanager --licenses
          # Установка конкретной версии build-tools
          sdkmanager "build-tools;30.0.3"
          echo "Build tools 30.0.3 installed."

      - name: Build and Sign APK
        run: |
          # 1. Сборка unsigned APK
          echo "Building unsigned APK..."
          ./gradlew assembleRelease

          # 2. Декодирование и сохранение Keystore
          echo "Decoding Keystore..."
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

          # 3. Определение путей к инструментам (теперь они точно существуют)
          BUILD_TOOLS_DIR="$ANDROID_HOME/build-tools/30.0.3/"
          APKSIGNER="${BUILD_TOOLS_DIR}apksigner"
          ZIPALIGN="${BUILD_TOOLS_DIR}zipalign"

          if [ ! -f "$APKSIGNER" ] || [ ! -f "$ZIPALIGN" ]; then
            echo "Error: Required tools not found in $BUILD_TOOLS_DIR"
            ls -R "$ANDROID_HOME/build-tools/"
            exit 1
          fi
          echo "Found apksigner and zipalign in $BUILD_TOOLS_DIR"

          INPUT_APK="./services-framework-proxy/build/outputs/apk/release/services-framework-proxy-release-unsigned.apk"
          OUTPUT_APK="output/GsfProxy.apk"

          if [ ! -f "$INPUT_APK" ]; then
            echo "Error: Unsigned APK not found at $INPUT_APK"
            exit 1
          fi

          # 4. Выравнивание (ZipAlign) - ДО подписи
          echo "Aligning APK..."
          mkdir -p output
          ALIGNED_APK="output/aligned-unsigned.apk"
          
          "$ZIPALIGN" -v -p 4 "$INPUT_APK" "$ALIGNED_APK"

          # 5. Подпись APK через apksigner
          echo "Signing aligned APK with apksigner..."
          "$APKSIGNER" sign \
            --ks keystore.jks \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --min-sdk-version 21 \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            "$ALIGNED_APK"

          # 6. Проверка подписи
          echo "Verifying signature..."
          "$APKSIGNER" verify --verbose "$ALIGNED_APK"

          # 7. Перемещение финального файла
          mv "$ALIGNED_APK" "$OUTPUT_APK"

          echo "Build completed successfully. Output: $OUTPUT_APK"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-gsf-apk
          path: output/GsfProxy.apk
          retention-days: 5
